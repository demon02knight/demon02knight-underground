<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>demon02knight underground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>demon02knight</h1>

<p>
this is not a brand.<br>
this is not content.<br>
this is a quiet corner of the internet.
</p>

<hr>

<h2>enter the underground</h2>

<p id="user-status">Checking login status...</p>

<input type="email" id="email" placeholder="email">
<br><br>
<input type="password" id="password" placeholder="password">
<br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

  <a id="admin-link" href="admin.html" style="display:none;">admin panel</a>
  
  <div id="username-section" style="display:none;">
  <input type="text" id="username-input" placeholder="choose a username">
  <button onclick="saveUsername()">Save</button>
</div>

<hr>
  
<hr>
<hr>
<h2>rooms</h2>

<select id="room-select">
  <option value="roomA">roomA</option>
  <option value="roomB">roomB</option>
  <option value="roomC">roomC</option>
</select>

<div id="chat-box"></div>

<input type="text" id="message-input" placeholder="leave something behind...">
<button onclick="sendMessage()">Send</button>
<hr>
  
<p class="small">
signal > noise<br>
depth > velocity<br>
presence > performance
</p>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  import { getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  
  const firebaseConfig = {
    apiKey: "AIzaSyAyHfbHaJj4-ON0jPy1be7XLO5WUOFVRyE",
    authDomain: "demon02knight-underground.firebaseapp.com",
    projectId: "demon02knight-underground",
    storageBucket: "demon02knight-underground.firebasestorage.app",
    messagingSenderId: "446345417376",
    appId: "1:446345417376:web:0457219bc40a8b0acf2fc5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_UID = "rHpRdUEU0NbRui3qxmetIjQESuk1";

  console.log("Firebase + Auth initialized");

  onAuthStateChanged(auth, async (user) => {
  const usernameSection = document.getElementById("username-section");
  const adminLink = document.getElementById("admin-link");

  if (user) {
    const isAdmin = user.uid === ADMIN_UID;

    // Show username section
    usernameSection.style.display = "block";

    // Show or hide admin link properly
    if (isAdmin) {
      adminLink.style.display = "inline";
    } else {
      adminLink.style.display = "none";
    }

    // Fetch user profile
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    let displayName;

    if (!userSnap.exists()) {
      displayName = "";
      await setDoc(userRef, { displayName: "" });
    } else {
      displayName = userSnap.data().displayName;
    }

    document.getElementById("username-input").value = displayName || "";

    document.getElementById("user-status").textContent =
      "Logged in as: " +
      (displayName || "no username") +
      (isAdmin ? " (admin)" : "");

  } else {
    // User logged out
    usernameSection.style.display = "none";
    adminLink.style.display = "none";
    document.getElementById("user-status").textContent = "Not logged in";
  }
});
    
  window.signup = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      alert("Account created");
    } catch (error) {
      alert(error.message);
    }
  };

  window.login = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Logged in");
    } catch (error) {
      alert(error.message);
    }
  };

  window.logout = async function() {
    await signOut(auth);
    alert("Logged out");
  };

window.saveUsername = async function () {
  if (!auth.currentUser) return;

  const newName = document.getElementById("username-input").value.trim().toLowerCase();

  if (newName.length < 3) {
    alert("Username must be at least 3 characters.");
    return;
  }

  const userRef = doc(db, "users", auth.currentUser.uid);
  const userSnap = await getDoc(userRef);

  // If locked and not admin → block
  if (userSnap.exists() && userSnap.data().locked && auth.currentUser.uid !== ADMIN_UID) {
    alert("Username is locked.");
    return;
  }

  // Check if username already taken
  const usernameRef = doc(db, "usernames", newName);
  const usernameSnap = await getDoc(usernameRef);

  if (usernameSnap.exists() && usernameSnap.data().uid !== auth.currentUser.uid) {
    alert("Username already taken.");
    return;
  }

  // Reserve username
  await setDoc(usernameRef, {
    uid: auth.currentUser.uid
  });

  // Save to user profile
  await setDoc(userRef, {
    displayName: newName,
    locked: true
  });

  document.getElementById("user-status").textContent =
    "Logged in as: " + newName + (auth.currentUser.uid === ADMIN_UID ? " (admin)" : "");

  alert("Username saved and locked.");
};
  
let currentRoom = "roomA";

function getRoomRef() {
  return collection(db, "rooms", currentRoom, "messages");
}

  document.getElementById("room-select").addEventListener("change", (e) => {
  currentRoom = e.target.value;
  loadMessages();
});

let unsubscribe;

function loadMessages() {
  if (unsubscribe) unsubscribe();

  const q = query(getRoomRef(), orderBy("createdAt"));

  unsubscribe = onSnapshot(q, async (snapshot) => {
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = "";

    for (const docSnap of snapshot.docs) {
      const data = docSnap.data();

      const messageDiv = document.createElement("div");
      messageDiv.innerHTML =
        "<strong>" + data.displayName + ":</strong> " + data.text;

      if (auth.currentUser && auth.currentUser.uid === ADMIN_UID) {
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "delete";
        deleteBtn.onclick = async () => {
          await deleteDoc(docSnap.ref);
        };
        messageDiv.appendChild(deleteBtn);
      }

      chatBox.appendChild(messageDiv);
    }
  });
}
  
window.sendMessage = async function () {
  if (!auth.currentUser) {
    alert("Login first.");
    return;
  }

  const input = document.getElementById("message-input");
  const text = input.value;
  if (text.trim() === "") return;

  const userRef = doc(db, "users", auth.currentUser.uid);
  const userSnap = await getDoc(userRef);
  const displayName = userSnap.data().displayName;

  await addDoc(getRoomRef(), {
    text: text,
    displayName: displayName,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

  loadMessages();
</script>

</body>
</html>
