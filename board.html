<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>public board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>public board</h1>
<p>a visible wall. no rooms. no hiding.</p>

<hr>

<p id="login-status">Checking login...</p>

<div id="board-box"></div>

<hr>

<div id="post-section">
  <input type="text" id="board-input" placeholder="leave something public...">
  <button onclick="postMessage()">Post</button>
</div>

<hr>

<a href="index.html">← back to underground</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    deleteDoc,
    doc,
    serverTimestamp,
    getDoc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyHfbHaJj4-ON0jPy1be7XLO5WUOFVRyE",
    authDomain: "demon02knight-underground.firebaseapp.com",
    projectId: "demon02knight-underground",
    storageBucket: "demon02knight-underground.firebasestorage.app",
    messagingSenderId: "446345417376",
    appId: "1:446345417376:web:0457219bc40a8b0acf2fc5"
  };

  const ADMIN_UID = "rHpRdUEU0NbRui3qxmetIjQESuk1";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const boardRef = collection(db, "publicBoard");
  const q = query(boardRef, orderBy("createdAt"));

  let currentUser = null;

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    const postSection = document.getElementById("post-section");

    if (user) {
      document.getElementById("login-status").textContent =
        "Logged in as: " + user.email;
      postSection.style.display = "block";
    } else {
      document.getElementById("login-status").textContent =
        "Viewing as guest (login required to post)";
      postSection.style.display = "none";
    }
  });

  // LOAD BOARD MESSAGES
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("board-box");
    container.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const div = document.createElement("div");

      const time = data.createdAt?.toDate();
      const formatted = time ? time.toLocaleString() : "just now";

      div.innerHTML =
        "<strong>" + data.displayName + "</strong> (" + formatted + ")<br>" +
        data.text;

      // 👍 REACTION
      const likeBtn = document.createElement("button");
      likeBtn.textContent = "👍 " + (data.reactions?.like || 0);

      likeBtn.onclick = async () => {
        const newCount = (data.reactions?.like || 0) + 1;
        await updateDoc(docSnap.ref, {
          "reactions.like": newCount
        });
      };

      div.appendChild(document.createElement("br"));
      div.appendChild(likeBtn);

      // REPLY BUTTON
      const replyBtn = document.createElement("button");
      replyBtn.textContent = "reply";

      replyBtn.onclick = () => {
        const input = document.createElement("input");
        input.placeholder = "write reply...";

        const send = document.createElement("button");
        send.textContent = "send";

        send.onclick = async () => {
          if (!currentUser) return;

          const userRef = doc(db, "users", currentUser.uid);
          const userSnap = await getDoc(userRef);
          const displayName = userSnap.exists()
            ? userSnap.data().displayName
            : "unknown";

          await addDoc(
            collection(docSnap.ref, "replies"),
            {
              text: input.value,
              displayName: displayName,
              uid: currentUser.uid,
              createdAt: serverTimestamp()
            }
          );

          input.remove();
          send.remove();
        };

        div.appendChild(document.createElement("br"));
        div.appendChild(input);
        div.appendChild(send);
      };

      div.appendChild(replyBtn);

      // LOAD REPLIES
      const repliesRef = collection(docSnap.ref, "replies");

      onSnapshot(query(repliesRef, orderBy("createdAt")), (replySnap) => {
        replySnap.forEach(replyDoc => {
          const r = replyDoc.data();
          const replyDiv = document.createElement("div");
          replyDiv.style.marginLeft = "20px";

          const replyTime = r.createdAt?.toDate();
          const replyFormatted = replyTime
            ? replyTime.toLocaleString()
            : "just now";

          replyDiv.innerHTML =
            "<strong>" + r.displayName + "</strong> (" +
            replyFormatted + ")<br>" +
            r.text;

          div.appendChild(replyDiv);
        });
      });

      // ADMIN DELETE
      if (currentUser && currentUser.uid === ADMIN_UID) {
        const del = document.createElement("button");
        del.textContent = "delete";
        del.onclick = async () => {
          await deleteDoc(docSnap.ref);
        };
        div.appendChild(document.createElement("br"));
        div.appendChild(del);
      }

      container.appendChild(div);
      container.appendChild(document.createElement("hr"));
    });
  });

  // POST MESSAGE
  window.postMessage = async function () {
    if (!currentUser) return;

    const input = document.getElementById("board-input");
    const text = input.value.trim();
    if (!text) return;

    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);
    const displayName = userSnap.exists()
      ? userSnap.data().displayName
      : "unknown";

    await addDoc(boardRef, {
      text,
      displayName,
      uid: currentUser.uid,
      reactions: { like: 0 },
      createdAt: serverTimestamp()
    });

    input.value = "";
  };
</script>
</body>
</html>
